<div class="card">
  <h2>Joueurs</h2>

  <label class="field">
    <span>Nombre de joueurs</span>
    <span class="stepper">
      <button
        type="button"
        class="stepper-btn"
        aria-label="Diminuer le nombre de joueurs"
        [disabled]="playerCount() <= minPlayers()"
        (click)="decrement()"
      >
        −
      </button>
      <span class="stepper-value">{{ playerCount() }}</span>
      <button
        type="button"
        class="stepper-btn"
        aria-label="Augmenter le nombre de joueurs"
        [disabled]="playerCount() >= maxPlayers()"
        (click)="increment()"
      >
        +
      </button>
    </span>
  </label>

  <div class="player-names">
    @for (name of visibleNames(); track $index) {
      <input
        type="text"
        maxlength="24"
        [placeholder]="'Joueur ' + ($index + 1)"
        [value]="name"
        (input)="updateName($index, $any($event.target).value)"
      />
    }
  </div>

  @if (duplicateName()) {
    <p class="error" aria-live="polite">Deux joueurs ne peuvent pas avoir le même nom.</p>
  }

  <button type="button" class="btn btn-primary" [disabled]="!!duplicateName()" (click)="confirm()">
    Commencer la partie
  </button>
</div>
