<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard — Compteur de points</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <h1><span class="hat">🧙</span> Wizard <span class="subtitle">Compteur de points</span></h1>
  </header>

  <!-- Écran de configuration -->
  <section id="setup-screen" class="screen">
    <div class="card">
      <h2>Nouvelle partie</h2>

      <label class="field">
        <span>Nombre de joueurs (3 à 6)</span>
        <div class="stepper">
          <button type="button" id="player-count-minus" class="stepper-btn">−</button>
          <span id="player-count-value">3</span>
          <button type="button" id="player-count-plus" class="stepper-btn">+</button>
        </div>
      </label>

      <div id="player-names" class="player-names"></div>

      <p class="hint" id="rounds-hint"></p>

      <button type="button" id="start-game-btn" class="btn btn-primary">Commencer la partie</button>
    </div>
  </section>

  <!-- Écran de jeu -->
  <section id="game-screen" class="screen hidden">

    <div class="round-info card">
      <div class="round-info-row">
        <div><strong>Manche</strong><br><span id="round-number"></span></div>
        <div><strong>Cartes distribuées</strong><br><span id="round-cards"></span></div>
        <div><strong>Donneur</strong><br><span id="round-dealer"></span></div>
      </div>
    </div>

    <div id="bidding-panel" class="card">
      <h2>Prédictions</h2>
      <p class="hint">Chaque apprenti annonce combien de plis il pense remporter.</p>
      <div id="bidding-inputs" class="input-grid"></div>
      <button type="button" id="confirm-bids-btn" class="btn btn-primary">Valider les prédictions</button>
    </div>

    <div id="results-panel" class="card hidden">
      <h2>Plis remportés</h2>
      <p class="hint">Une fois la manche jouée, indiquez le nombre de plis remportés par chacun.</p>
      <div id="results-inputs" class="input-grid"></div>
      <p id="results-error" class="error hidden"></p>
      <button type="button" id="confirm-results-btn" class="btn btn-primary">Valider les résultats</button>
    </div>

    <div class="card">
      <h2>Tableau des scores</h2>
      <div class="table-wrap">
        <table id="score-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <button type="button" id="new-game-btn" class="btn btn-secondary">Nouvelle partie</button>
  </section>

  <!-- Écran de fin -->
  <section id="end-screen" class="screen hidden">
    <div class="card">
      <h2>🏆 Fin de la partie</h2>
      <div id="final-ranking"></div>
      <button type="button" id="restart-game-btn" class="btn btn-primary">Nouvelle partie</button>
    </div>
  </section>

</div>
<script src="js/app.js"></script>
</body>
</html>
